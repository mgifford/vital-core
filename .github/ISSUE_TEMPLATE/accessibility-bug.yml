name: Accessibility Bug Report
description: Report an accessibility defect with reproducible evidence
labels:
  - accessibility
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: Exact page URL where the issue occurs
      placeholder: https://example.gov/path
    validations:
      required: true

  - type: input
    id: page-context
    attributes:
      label: Page Context
      description: Page title or short context label
      placeholder: Medicare coverage page
    validations:
      required: true

  - type: input
    id: target-locator
    attributes:
      label: Target Element Locator
      description: CSS selector, XPath, or equivalent target locator
      placeholder: main .search-form button[type="submit"]
    validations:
      required: true

  - type: textarea
    id: html-snippet
    attributes:
      label: HTML Snippet
      description: Minimal HTML snippet showing the failing element
    validations:
      required: true

  - type: input
    id: rule-id
    attributes:
      label: Rule ID
      description: axe rule id or equivalent check id
      placeholder: color-contrast
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - Serious
        - Moderate
        - Minor
    validations:
      required: true

  - type: input
    id: wcag
    attributes:
      label: WCAG Success Criterion
      description: Include criterion id(s), e.g. 1.4.3
      placeholder: 1.4.3 Contrast (Minimum)
    validations:
      required: true

  - type: input
    id: section508
    attributes:
      label: Section 508 Mapping
      description: Optional but recommended
      placeholder: 302.7
    validations:
      required: false

  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction Steps
      description: Numbered, deterministic steps
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: frequency
    attributes:
      label: Frequency and Impact Scope
      description: How often and how broadly this issue appears
      placeholder: Reproduces on all tested pages using shared header component
    validations:
      required: true

  - type: textarea
    id: remediation
    attributes:
      label: Suggested Remediation
      description: Practical engineering fix guidance
    validations:
      required: true
