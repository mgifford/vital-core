name: Scan Vital Core
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC (midnight ET)
  workflow_dispatch:
    inputs:
      intensity:
        description: "Scan intensity (standard or deep)"
        required: false
        default: "standard"
        type: choice
        options:
          - standard
          - deep
jobs:
  scan:
    # Use ubuntu-latest on GitHub Actions — macOS runners use /opt/homebrew/bin/git
    # which causes git failures in deployment steps. For local testing, run
    # `npm run scan:local` directly on your Mac instead of via act.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run Scan Locally
        env:
          VITAL_ALFA_CMD: node_modules/.bin/alfa
          VITAL_TARGET_LIMIT: 5
          VITAL_SCAN_INTENSITY: ${{ github.event.inputs.intensity || 'standard' }}
        run: npm run scan:local
      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: scan-results
          path: ./tmp

      - name: Verify generated dashboard output exists
        if: success()
        run: |
          set -euo pipefail
          test -f dist/index.html

      - name: Setup GitHub Pages Deployment Context
        if: success()
        uses: actions/configure-pages@v6

      - name: Package Generated Static Dashboard Build
        if: success()
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

      - name: Deploy Compiled Dashboard directly to GitHub Pages Engine
        if: success()
        id: deployment
        uses: actions/deploy-pages@v5
