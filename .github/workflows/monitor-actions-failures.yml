name: Monitor Workflow Failures

on:
  workflow_run:
    workflows:
      - CI Test and Validation
      - Governance Guardrails
      - Execute Continuous Web Quality Compliance Scan
      - Pages Quality Gate
      - Validate Docs Bundle
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  open-or-update-failure-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update failure tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const marker = `<!-- workflow-run-id:${run.id} -->`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 100
            });

            const existing = openIssues.find((issue) => (issue.body || '').includes(marker));
            const summary = [
              `Workflow: ${run.name}`,
              `Run number: ${run.run_number}`,
              `Attempt: ${run.run_attempt}`,
              `Branch: ${run.head_branch}`,
              `Commit: ${run.head_sha}`,
              `Event: ${run.event}`,
              `Triggered by: @${run.actor?.login || 'unknown'}`,
              `Run URL: ${run.html_url}`
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Another failure attempt was recorded.\n\n${summary}`
              });
              core.info(`Updated existing failure issue #${existing.number}`);
              return;
            }

            const title = `Workflow failure: ${run.name} (run #${run.run_number})`;
            const body = [
              marker,
              '',
              'A GitHub Actions workflow run failed and requires review.',
              '',
              '## Failure Summary',
              '',
              summary,
              '',
              '## Triage Checklist',
              '',
              '- [ ] Identify failing job and step',
              '- [ ] Capture root cause',
              '- [ ] Propose fix or rollback',
              '- [ ] Re-run workflow after fix'
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['automated', 'ci-failure']
            });

            core.info(`Created failure issue #${issue.data.number}`);
